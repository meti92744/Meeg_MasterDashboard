<style>
:root{
  --navy:#1A2B5F;--teal:#2ABFBF;--teal2:#1f9a9a;
  --gold:#FFD166;--rose:#FF6B9D;--purple:#a89ef0;
  --grn:#4ade80;--orange:#F0994A;--red:#ef4444;
  --bg:#07101f;--bg2:#0d1b30;
  --brd:rgba(255,255,255,0.09);--brd2:rgba(255,255,255,0.15);
  --glass:rgba(255,255,255,0.05);--gb:rgba(255,255,255,0.08);
  --txt:#e8edf5;--txt2:rgba(232,237,245,0.55);--txt3:rgba(232,237,245,0.28);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(42,191,191,0.2);border-radius:2px}

/* NAV shared */
.topnav{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;
  border-bottom:1px solid var(--brd);background:rgba(7,16,31,0.88);
  backdrop-filter:blur(18px);position:sticky;top:0;z-index:50}
.nav-brand{display:flex;align-items:center;gap:10px}
.nav-hex{width:33px;height:33px;background:linear-gradient(135deg,var(--teal),var(--navy));
  border-radius:9px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 14px rgba(42,191,191,0.28)}
.nav-title{font-size:14px;font-weight:700}.nav-title em{color:var(--teal);font-style:normal}
.role-chip{font-size:11px;border-radius:20px;padding:3px 10px;font-weight:500}
.nav-right{display:flex;align-items:center;gap:12px}
.live-pill{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--teal);
  background:rgba(42,191,191,0.08);border:1px solid rgba(42,191,191,0.18);
  border-radius:20px;padding:4px 12px}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--teal);
  animation:lv 1.2s ease-in-out infinite}
@keyframes lv{0%,100%{opacity:1}50%{opacity:.2}}
.nav-clock{font-size:13px;color:var(--txt2);font-variant-numeric:tabular-nums}
.nav-avatar{width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;color:#fff;cursor:pointer}
.logout-btn{font-size:11px;padding:4px 10px;border-radius:8px;cursor:pointer;
  background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);
  color:#fca5a5;transition:all .2s}
.logout-btn:hover{background:rgba(239,68,68,0.16)}

/* Cards + Glass */
.glass-card{background:var(--glass);border:1px solid var(--brd);border-radius:16px;
  backdrop-filter:blur(10px);transition:border-color .2s}
.glass-card:hover{border-color:var(--brd2)}

/* Chips */
.chip-group{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:5px 13px;border-radius:20px;border:1px solid var(--brd2);
  background:var(--glass);color:var(--txt2);cursor:pointer;transition:all .2s;user-select:none}
.chip:hover{border-color:rgba(42,191,191,0.3);color:var(--txt)}
.chip.active{background:rgba(42,191,191,0.13);border-color:rgba(42,191,191,0.4);
  color:var(--teal);font-weight:600}

/* Loading spinner */
.spinner{width:36px;height:36px;border:3px solid rgba(42,191,191,0.15);
  border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:12px;padding:60px;color:var(--txt2);font-size:13px}

/* Toast */
.toast-container{position:fixed;bottom:24px;right:24px;z-index:999;
  display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 16px;border-radius:12px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:8px;
  backdrop-filter:blur(12px);box-shadow:0 8px 24px rgba(0,0,0,0.4);
  animation:toastIn .3s ease;max-width:320px}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:none}}
.toast.suc{background:rgba(74,222,128,0.13);border:1px solid rgba(74,222,128,0.28);color:var(--grn)}
.toast.err{background:rgba(239,68,68,0.13);border:1px solid rgba(239,68,68,0.28);color:#fca5a5}
.toast.inf{background:rgba(42,191,191,0.1);border:1px solid rgba(42,191,191,0.25);color:var(--teal)}
.toast.wrn{background:rgba(255,209,102,0.1);border:1px solid rgba(255,209,102,0.25);color:var(--gold)}

/* Orbs */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0}
</style>

<script>
// ── SHARED UTILITIES ─────────────────────────────────────────

// Session (بيتحقن من الـ Router)
var SESSION = {};
try { SESSION = JSON.parse('<?= session ?>'); } catch(e) {}

// Live clock
function _startClock(elId) {
  var el = document.getElementById(elId);
  if (!el) return;
  function tick() {
    var n=new Date(), h=n.getHours(), m=n.getMinutes(), s=n.getSeconds();
    var ap=h>=12?'PM':'AM'; h=h%12||12;
    el.textContent=pad(h)+':'+pad(m)+':'+pad(s)+' '+ap;
  }
  function pad(x){return String(x).padStart(2,'0')}
  tick(); setInterval(tick, 1000);
}

// Toast
var _toastContainer;
function showToast(msg, type, duration) {
  if (!_toastContainer) {
    _toastContainer = document.createElement('div');
    _toastContainer.className = 'toast-container';
    document.body.appendChild(_toastContainer);
  }
  var t = document.createElement('div');
  t.className = 'toast ' + (type||'inf');
  t.textContent = msg;
  _toastContainer.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .3s';
    setTimeout(function(){ t.remove(); }, 320); }, duration||3000);
}

// Call backend (بيستخدم google.script.run)
function callBackend(action, params, onSuccess, onError) {
  var payload = Object.assign({ action: action, sessionToken: SESSION._token || '' }, params || {});
  google.script.run
    .withSuccessHandler(function(res) {
      if (res && res.code === 401) {
        showToast('Session expired — redirecting to login…', 'err');
        setTimeout(function(){ google.script.run.doGet(); }, 1500);
        return;
      }
      if (onSuccess) onSuccess(res);
    })
    .withFailureHandler(function(err) {
      showToast('Error: ' + err.message, 'err');
      if (onError) onError(err);
    })
    .processRequest(JSON.stringify(payload));
}

// Logout
function logout() {
  callBackend('logout', {}, function() {
    showToast('Logged out', 'inf');
    setTimeout(function(){
      window.location.reload();
    }, 800);
  });
}

// Avatar initials
function getInitials(name) {
  return String(name||'?').split(' ').map(function(w){ return w[0]; }).join('').slice(0,2).toUpperCase();
}

// Role chip colors
var ROLE_COLORS = {
  'Admin'            : { bg:'rgba(239,68,68,0.12)',  border:'rgba(239,68,68,0.28)',  color:'#fca5a5' },
  'Shift Supervisor' : { bg:'rgba(160,142,240,0.12)',border:'rgba(160,142,240,0.25)',color:'#a89ef0' },
  'Floor Supervisor' : { bg:'rgba(42,191,191,0.11)', border:'rgba(42,191,191,0.25)', color:'#2ABFBF' },
  'QA & Training'    : { bg:'rgba(255,209,102,0.1)', border:'rgba(255,209,102,0.22)',color:'#FFD166' },
  'Workload Manager' : { bg:'rgba(240,153,74,0.11)', border:'rgba(240,153,74,0.25)', color:'#F0994A' },
  'Labeler'          : { bg:'rgba(255,255,255,0.06)',border:'rgba(255,255,255,0.12)',color:'rgba(232,237,245,0.6)' },
};
function applyRoleChip(el, role) {
  var c = ROLE_COLORS[role] || ROLE_COLORS['Labeler'];
  el.style.background = c.bg;
  el.style.border     = '1px solid ' + c.border;
  el.style.color      = c.color;
}

// Build nav HTML
function buildNav(titleSuffix) {
  var role = SESSION.role || '';
  var c    = ROLE_COLORS[role] || ROLE_COLORS['Labeler'];
  return '<nav class="topnav">'
    + '<div class="nav-brand">'
    +   '<div class="nav-hex"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M12 2L21 7V17L12 22L3 17V7Z" stroke="#2ABFBF" stroke-width="1.8" stroke-linejoin="round"/><circle cx="12" cy="12" r="2.5" fill="#2ABFBF"/></svg></div>'
    +   '<div class="nav-title">ME<em>EG</em> Ops</div>'
    +   '<div class="role-chip" style="background:'+c.bg+';border:1px solid '+c.border+';color:'+c.color+'">'+role+'</div>'
    + '</div>'
    + '<div class="nav-right">'
    +   '<div class="live-pill"><div class="ldot"></div>Live</div>'
    +   '<div class="nav-clock" id="shared-clock">--:--:--</div>'
    +   '<div class="nav-avatar" style="background:linear-gradient(135deg,'+c.border+','+c.color+')">'+getInitials(SESSION.name)+'</div>'
    +   '<button class="logout-btn" onclick="logout()">Sign out</button>'
    + '</div>'
    + '</nav>';
}

// Init shared elements after DOM ready
document.addEventListener('DOMContentLoaded', function() {
  // Inject nav if placeholder exists
  var navPlaceholder = document.getElementById('nav-placeholder');
  if (navPlaceholder) {
    navPlaceholder.innerHTML = buildNav();
    _startClock('shared-clock');
  }
});
</script>
