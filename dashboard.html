<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEEG Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --navy:#1A2B5F;--teal:#2ABFBF;--teal2:#1f9a9a;
  --bg:#07101f;--bg2:#0d1b2e;--bg3:#112240;
  --brd:rgba(255,255,255,0.08);--brd2:rgba(255,255,255,0.14);
  --txt:#e8edf5;--txt2:rgba(232,237,245,0.6);--txt3:rgba(232,237,245,0.3);
  --red:#ff6b6b;--green:#2ABFBF;--yellow:#FFD166;--orange:#F0994A;
}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}

/* ── SIDEBAR ── */
#sidebar{
  position:fixed;left:0;top:0;bottom:0;width:220px;
  background:rgba(13,27,46,0.95);border-right:1px solid var(--brd);
  backdrop-filter:blur(20px);z-index:50;
  display:flex;flex-direction:column;padding:20px 0;
  transition:transform .3s;
}
.sb-logo{display:flex;align-items:center;gap:10px;padding:0 20px 20px;border-bottom:1px solid var(--brd)}
.sb-logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--teal),var(--navy));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-txt{font-size:16px;font-weight:800;letter-spacing:1px}
.sb-logo-sub{font-size:9px;color:var(--txt3);letter-spacing:2px}

.sb-user{padding:14px 20px;border-bottom:1px solid var(--brd);margin-bottom:8px}
.sb-user-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-user-role{font-size:11px;color:var(--teal);margin-top:2px}

.sb-nav{flex:1;overflow-y:auto;padding:0 12px}
.sb-item{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-radius:10px;cursor:pointer;transition:all .2s;
  font-size:13px;color:var(--txt2);margin-bottom:2px;
}
.sb-item:hover{background:rgba(42,191,191,0.08);color:var(--txt)}
.sb-item.active{background:rgba(42,191,191,0.15);color:var(--teal);font-weight:600}
.sb-item-ico{width:18px;text-align:center;flex-shrink:0}

.sb-bottom{padding:12px 20px;border-top:1px solid var(--brd)}
.sb-clock{font-size:12px;color:var(--txt3);font-variant-numeric:tabular-nums;margin-bottom:8px}
.sb-signout{font-size:12px;color:var(--txt3);cursor:pointer;transition:color .2s}
.sb-signout:hover{color:var(--red)}

/* ── MAIN ── */
#main{margin-left:220px;min-height:100vh;padding:24px}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.topbar-title{font-size:20px;font-weight:700}
.topbar-sub{font-size:13px;color:var(--txt2);margin-top:2px}
.refresh-btn{
  display:flex;align-items:center;gap:6px;padding:7px 14px;
  background:rgba(42,191,191,0.1);border:1px solid rgba(42,191,191,0.3);
  border-radius:8px;color:var(--teal);font-size:12px;cursor:pointer;transition:all .2s;
}
.refresh-btn:hover{background:rgba(42,191,191,0.2)}

/* ── CARDS ── */
.cards{display:grid;gap:16px;margin-bottom:24px}
.cards-4{grid-template-columns:repeat(4,1fr)}
.cards-3{grid-template-columns:repeat(3,1fr)}
.cards-2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;padding:20px}
.card-sm{padding:16px}
.card-label{font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.card-value{font-size:28px;font-weight:700;color:var(--txt)}
.card-value.teal{color:var(--teal)}
.card-value.yellow{color:var(--yellow)}
.card-value.green{color:#4ade80}
.card-value.red{color:var(--red)}
.card-sub{font-size:12px;color:var(--txt3);margin-top:4px}
.card-icon{font-size:22px;margin-bottom:8px}

/* ── TABLE ── */
.tbl-wrap{background:var(--bg2);border:1px solid var(--brd);border-radius:16px;overflow:hidden;margin-bottom:24px}
.tbl-head{padding:16px 20px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between}
.tbl-title{font-size:14px;font-weight:600}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:11px;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--brd);background:rgba(255,255,255,0.02)}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}

/* ── BADGES ── */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.badge-teal{background:rgba(42,191,191,0.15);color:var(--teal)}
.badge-green{background:rgba(74,222,128,0.15);color:#4ade80}
.badge-red{background:rgba(255,107,107,0.15);color:var(--red)}
.badge-yellow{background:rgba(255,209,102,0.15);color:var(--yellow)}
.badge-gray{background:rgba(255,255,255,0.08);color:var(--txt2)}

/* ── FILTERS ── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.filter-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--brd2);background:transparent;color:var(--txt2);font-size:12px;cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{background:rgba(42,191,191,0.12);border-color:rgba(42,191,191,0.4);color:var(--teal)}
.filter-input{padding:6px 12px;border-radius:8px;border:1px solid var(--brd2);background:rgba(255,255,255,0.05);color:var(--txt);font-size:12px;outline:none}
.filter-input:focus{border-color:rgba(42,191,191,0.4)}

/* ── PROGRESS ── */
.progress-wrap{margin-top:8px}
.progress-bar{height:6px;border-radius:3px;background:rgba(255,255,255,0.08);overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:var(--teal);transition:width .5s}
.progress-fill.yellow{background:var(--yellow)}
.progress-fill.red{background:var(--red)}
.progress-fill.green{background:#4ade80}

/* ── LOADING / EMPTY ── */
.loading-state{padding:48px;text-align:center;color:var(--txt3)}
.spinner-sm{width:24px;height:24px;border:2px solid rgba(42,191,191,.15);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{padding:40px;text-align:center;color:var(--txt3);font-size:14px}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--brd2);border-radius:20px;padding:28px;width:460px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;margin-bottom:20px}
.form-field{margin-bottom:14px}
.form-label{font-size:12px;color:var(--txt2);margin-bottom:6px;display:block}
.form-input{width:100%;padding:10px 14px;background:rgba(255,255,255,0.06);border:1px solid var(--brd2);border-radius:10px;color:var(--txt);font-size:13px;outline:none}
.form-input:focus{border-color:rgba(42,191,191,0.5)}
.form-select{width:100%;padding:10px 14px;background:var(--bg3);border:1px solid var(--brd2);border-radius:10px;color:var(--txt);font-size:13px;outline:none}
.btn{padding:9px 18px;border-radius:10px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s}
.btn-teal{background:var(--teal);color:#07101f}
.btn-teal:hover{background:var(--teal2)}
.btn-ghost{background:transparent;border:1px solid var(--brd2);color:var(--txt2)}
.btn-ghost:hover{border-color:rgba(42,191,191,0.4);color:var(--teal)}
.btn-red{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.3);color:var(--red)}
.btn-red:hover{background:rgba(255,107,107,0.25)}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}

/* ── LEADERBOARD ── */
.lb-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:10px;margin-bottom:6px;background:rgba(255,255,255,0.03);transition:background .2s}
.lb-item:hover{background:rgba(42,191,191,0.06)}
.lb-rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.lb-rank.gold{background:rgba(255,209,102,0.2);color:var(--yellow)}
.lb-rank.silver{background:rgba(192,192,192,0.2);color:#c0c0c0}
.lb-rank.bronze{background:rgba(205,127,50,0.2);color:#cd7f32}
.lb-rank.normal{background:rgba(255,255,255,0.08);color:var(--txt3)}
.lb-name{flex:1;font-size:13px;font-weight:500}
.lb-sub{font-size:11px;color:var(--txt3)}
.lb-count{font-size:16px;font-weight:700;color:var(--teal)}

/* ── SECTION ── */
.section{margin-bottom:28px}
.section-title{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--brd)}

/* ── TODAY INDICATOR ── */
.today-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-right:6px;box-shadow:0 0 8px rgba(74,222,128,0.6)}
.absent-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;margin-right:6px}

@media(max-width:768px){
  #sidebar{transform:translateX(-100%)}
  #main{margin-left:0}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div id="sidebar">
  <div class="sb-logo">
    <div class="sb-logo-icon">
      <svg width="20" height="20" viewBox="0 0 36 36" fill="none">
        <path d="M6 10L18 4L30 10L30 26L18 32L6 26Z" stroke="#fff" stroke-width="2" fill="none" stroke-linejoin="round"/>
        <circle cx="18" cy="18" r="3" fill="#2ABFBF"/>
      </svg>
    </div>
    <div>
      <div class="sb-logo-txt">MEEG</div>
      <div class="sb-logo-sub">Operations</div>
    </div>
  </div>
  <div class="sb-user">
    <div class="sb-user-name" id="sb-name">—</div>
    <div class="sb-user-role" id="sb-role">—</div>
  </div>
  <nav class="sb-nav" id="sb-nav"></nav>
  <div class="sb-bottom">
    <div class="sb-clock" id="sb-clock"></div>
    <div class="sb-signout" onclick="signOut()">⎋ Sign out</div>
  </div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="view-container">
    <div class="loading-state"><div class="spinner-sm"></div><div>Loading dashboard…</div></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-box"></div>
</div>

<script>
var APPS_URL = 'https://script.google.com/macros/s/AKfycbwncGfNuZXqvTp-WUdjP8cIAwYBda5-4i4aggd5SFHA5jVpdG8D6hh1Pg38D5DPIa5A/exec';
var SESSION = null;
var CURRENT_VIEW = null;
var REFRESH_TIMER = null;

// ── Init ────────────────────────────────────────────────
function initDashboard(session){
  SESSION = session;
  document.getElementById('sb-name').textContent = session.name || session.email;
  document.getElementById('sb-role').textContent = session.role;
  buildNav(session.role);
  startClock();
  var defaultView = getDefaultView(session.role);
  switchView(defaultView);
  startAutoRefresh();
}

// ── Auto-start from sessionStorage ──────────────────────
window.addEventListener('DOMContentLoaded', function(){
  var stored = sessionStorage.getItem('meeg_session');
  if(stored){ try{ initDashboard(JSON.parse(stored)); }catch(e){} }
});

// ── Clock ────────────────────────────────────────────────
function startClock(){
  function tick(){
    var n=new Date(),h=n.getHours(),m=n.getMinutes(),s=n.getSeconds();
    var ap=h>=12?'PM':'AM'; h=h%12||12;
    document.getElementById('sb-clock').textContent=pad(h)+':'+pad(m)+':'+pad(s)+' '+ap;
  }
  tick(); setInterval(tick,1000);
}
function pad(x){return String(x).padStart(2,'0')}

// ── Sign out ────────────────────────────────────────────
function signOut(){
  sessionStorage.clear();
  location.href='index.html';
}

// ── Auto refresh every 30s ───────────────────────────────
function startAutoRefresh(){
  if(REFRESH_TIMER) clearInterval(REFRESH_TIMER);
  REFRESH_TIMER = setInterval(function(){ if(CURRENT_VIEW) switchView(CURRENT_VIEW,true); }, 30000);
}

// ── API call ─────────────────────────────────────────────
async function api(action, params){
  var body = Object.assign({ action: action, session: SESSION }, params||{});
  try {
    var res = await fetch(APPS_URL, {
      method  : 'POST',
      headers : { 'Content-Type': 'text/plain' },
      redirect: 'follow',
      body    : JSON.stringify(body)
    });
    var text = await res.text();
    try { return JSON.parse(text); }
    catch(e) {
      console.error('Non-JSON response:', text.substring(0,200));
      return { error: 'Invalid response from server' };
    }
  } catch(err) {
    console.error('API error:', err);
    return { error: 'Connection failed: ' + err.message };
  }
}

// ── TODAY string ─────────────────────────────────────────
function todayStr(){
  var d=new Date();
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}

// ── NAV config per role ──────────────────────────────────
var NAV_CONFIG = {
  'Labeler': [
    {id:'labeler-home', ico:'📊', label:'My Dashboard'},
    {id:'labeler-tasks', ico:'✅', label:'My Tasks'},
    {id:'labeler-quality', ico:'⭐', label:'My Quality'},
    {id:'labeler-attendance', ico:'🕐', label:'Attendance'},
  ],
  'Floor Supervisor': [
    {id:'floor-home', ico:'📊', label:'Room Overview'},
    {id:'floor-tasks', ico:'✅', label:'Task Tracking'},
    {id:'floor-quality', ico:'⭐', label:'Quality'},
    {id:'floor-attendance', ico:'🕐', label:'Hours & ATOT'},
  ],
  'Shift Supervisor': [
    {id:'shift-home', ico:'📊', label:'All Rooms'},
    {id:'shift-tasks', ico:'✅', label:'Tasks'},
    {id:'shift-quality', ico:'⭐', label:'Quality'},
    {id:'shift-leaderboard', ico:'🏆', label:'Leaderboard'},
  ],
  'QA & Training': [
    {id:'qa-quality', ico:'⭐', label:'Quality Analysis'},
    {id:'qa-training', ico:'📚', label:'Training'},
  ],
  'Workload Manager': [
    {id:'wm-home', ico:'📊', label:'Overview'},
    {id:'wm-rooms', ico:'🏢', label:'All Rooms'},
    {id:'wm-hours', ico:'⏱', label:'Hours'},
    {id:'wm-training', ico:'📚', label:'Training Mgmt'},
  ],
  'Admin': [
    {id:'admin-dashboard', ico:'📊', label:'Dashboard'},
    {id:'admin-users', ico:'👥', label:'User Management'},
    {id:'admin-rooms', ico:'🏢', label:'All Rooms'},
    {id:'admin-quality', ico:'⭐', label:'Quality'},
  ],
};

function buildNav(role){
  var items = NAV_CONFIG[role] || NAV_CONFIG['Labeler'];
  var html = '';
  items.forEach(function(item){
    html += '<div class="sb-item" id="nav-'+item.id+'" onclick="switchView(\''+item.id+'\')">'
          + '<span class="sb-item-ico">'+item.ico+'</span>'
          + '<span>'+item.label+'</span></div>';
  });
  document.getElementById('sb-nav').innerHTML = html;
}

function getDefaultView(role){
  var defaults = {
    'Labeler':'labeler-home',
    'Floor Supervisor':'floor-home',
    'Shift Supervisor':'shift-home',
    'QA & Training':'qa-quality',
    'Workload Manager':'wm-home',
    'Admin':'admin-dashboard',
  };
  return defaults[role]||'labeler-home';
}

function setActiveNav(viewId){
  document.querySelectorAll('.sb-item').forEach(function(el){ el.classList.remove('active'); });
  var el = document.getElementById('nav-'+viewId);
  if(el) el.classList.add('active');
}

// ── VIEW ROUTER ──────────────────────────────────────────
function switchView(viewId, silent){
  CURRENT_VIEW = viewId;
  setActiveNav(viewId);
  if(!silent) document.getElementById('view-container').innerHTML = '<div class="loading-state"><div class="spinner-sm"></div><div>Loading…</div></div>';

  var renders = {
    'labeler-home'      : renderLabelerHome,
    'labeler-tasks'     : renderLabelerTasks,
    'labeler-quality'   : renderLabelerQuality,
    'labeler-attendance': renderLabelerAttendance,
    'floor-home'        : renderFloorHome,
    'floor-tasks'       : renderFloorTasks,
    'floor-quality'     : renderFloorQuality,
    'floor-attendance'  : renderFloorAttendance,
    'shift-home'        : renderShiftHome,
    'shift-tasks'       : renderShiftTasks,
    'shift-quality'     : renderShiftQuality,
    'shift-leaderboard' : renderShiftLeaderboard,
    'qa-quality'        : renderQAQuality,
    'qa-training'       : renderQATraining,
    'wm-home'           : renderWMHome,
    'wm-rooms'          : renderWMRooms,
    'wm-hours'          : renderWMHours,
    'wm-training'       : renderWMTraining,
    'admin-dashboard'   : renderAdminDashboard,
    'admin-users'       : renderAdminUsers,
    'admin-rooms'       : renderAdminRooms,
    'admin-quality'     : renderAdminQuality,
  };
  if(renders[viewId]) renders[viewId]();
}

// ─────────────────────────────────────────────────────────
//  LABELER VIEWS
// ─────────────────────────────────────────────────────────
async function renderLabelerHome(){
  var data = await api('getLabelerData');
  if(data.error){ showError(data.error); return; }

  var today = todayStr();
  var todayAtot = (data.atot||[]).find(function(r){ return dateStr(r['Date']||r['date'])===today; });
  var isPresent = !!todayAtot;
  var hours = todayAtot ? (todayAtot['Hours']||todayAtot['ATOT']||todayAtot['hours']||'—') : '—';
  var quality = data.latestQuality;
  var score = quality ? (quality['Accuracy']||quality['Score']||quality['Quality']||0) : 0;
  var scoreColor = score>=90?'green':score>=80?'teal':score>=70?'yellow':'red';

  var tasksByDay = {};
  (data.allTasks||[]).forEach(function(t){
    var d = dateStr(t['Created At']||t['Timestamp']||'');
    if(d){ tasksByDay[d] = (tasksByDay[d]||0)+1; }
  });
  var last7 = [];
  for(var i=6;i>=0;i--){
    var d=new Date(); d.setDate(d.getDate()-i);
    var ds=d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
    last7.push({date:ds, count:tasksByDay[ds]||0, label:['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()]});
  }
  var maxCount = Math.max(1, Math.max.apply(null, last7.map(function(d){return d.count;})));

  var html = topbar('My Dashboard','Welcome back, '+(SESSION.name||SESSION.email))
    + '<div class="cards cards-4" style="margin-bottom:20px">'
    + statCard('📋','Tasks Today', data.totalTasksToday||0, 'teal', SESSION.shift||'—')
    + statCard('⭐','Quality Score', score+'%', scoreColor, 'Latest score')
    + statCard('🕐','Hours Today', hours, 'yellow', isPresent?'<span class="today-dot"></span>Present':'<span class="absent-dot"></span>Absent')
    + statCard('📦','Total Tasks', (data.allTasks||[]).length, '', 'All time')
    + '</div>'

    + '<div class="section"><div class="section-title">Tasks — Last 7 Days</div>'
    + '<div class="card"><div style="display:flex;align-items:flex-end;gap:8px;height:100px">'
    + last7.map(function(d){
        var h = Math.max(4, Math.round((d.count/maxCount)*90));
        var isToday = d.date===today;
        return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'
          +'<div style="font-size:11px;color:var(--txt3)">'+(d.count||'')+'</div>'
          +'<div style="width:100%;height:'+h+'px;border-radius:4px 4px 0 0;background:'+(isToday?'var(--teal)':'rgba(42,191,191,0.3)')+'"></div>'
          +'<div style="font-size:10px;color:'+(isToday?'var(--teal)':'var(--txt3)')+'">'+d.label+'</div>'
          +'</div>';
      }).join('')
    + '</div></div></div>'

    + '<div class="cards cards-2">'
    + '<div class="card"><div class="section-title">Tasks by Queue</div>'
    + objToRows(data.tasksByQueue||{})
    + '</div>'
    + '<div class="card"><div class="section-title">Quality Details</div>'
    + (quality ? qualityDetails(quality) : '<div class="empty-state">No quality data yet</div>')
    + '</div></div>';

  document.getElementById('view-container').innerHTML = html;
}

async function renderLabelerTasks(){
  var data = await api('getLabelerData');
  if(data.error){ showError(data.error); return; }
  var tasks = data.allTasks||[];

  var html = topbar('My Tasks', tasks.length+' total submissions')
    + '<div class="filters">'
    + '<input class="filter-input" id="f-search" placeholder="Search..." oninput="filterTable()">'
    + '<input class="filter-input" id="f-date" type="date" onchange="filterTable()">'
    + '</div>'
    + '<div class="tbl-wrap"><div class="tbl-head"><span class="tbl-title">Submitted Tasks</span></div>'
    + '<table><thead><tr><th>Date</th><th>Shift</th><th>Queue</th><th>Modality</th><th>Pass</th><th>Objects</th><th>Device</th></tr></thead>'
    + '<tbody id="tasks-tbody">'
    + tasks.slice(-200).reverse().map(function(t){
        return '<tr>'
          +'<td>'+dateStr(t['Created At']||t['Timestamp']||'')+'</td>'

function loadTrainees(){
  var trainees = JSON.parse(localStorage.getItem('meeg_trainees')||'[]');
  var tbody = document.getElementById('training-tbody');
  if(!tbody) return;
  if(!trainees.length){
    tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--txt3);padding:24px">No trainees yet</td></tr>';
    return;
  }
  tbody.innerHTML = trainees.map(function(t,i){
    return '<tr>'
      +'<td>'+t.name+'</td><td style="color:var(--txt2)">'+t.email+'</td>'
      +'<td>'+badge('Phase '+t.phase,'teal')+'</td>'
      +'<td>'+t.start+'</td>'
      +'<td>'+badge(t.decision||'Pending',t.decision==='Go'?'green':t.decision==='No-Go'?'red':'yellow')+'</td>'
      +'<td style="display:flex;gap:6px">'
      +'<button class="btn btn-ghost" style="padding:4px 10px;font-size:11px" onclick="updateTrainee('+i+',\'Go\')">Go</button>'
      +'<button class="btn btn-red" style="padding:4px 10px;font-size:11px" onclick="updateTrainee('+i+',\'No-Go\')">No-Go</button>'
      +'</td></tr>';
  }).join('');
}

function registerNewHire(){
  var email=document.getElementById('nh-email').value.trim();
  var name=document.getElementById('nh-name').value.trim();
  var shift=document.getElementById('nh-shift').value;
  if(!email||!name){ alert('Fill all fields'); return; }
  var trainees=JSON.parse(localStorage.getItem('meeg_trainees')||'[]');
  trainees.push({email,name,shift,phase:1,start:todayStr(),decision:'Pending'});
  localStorage.setItem('meeg_trainees',JSON.stringify(trainees));
  document.getElementById('nh-email').value='';
  document.getElementById('nh-name').value='';
  loadTrainees();
}

function updateTrainee(i,decision){
  var trainees=JSON.parse(localStorage.getItem('meeg_trainees')||'[]');
  if(trainees[i]){ trainees[i].decision=decision; localStorage.setItem('meeg_trainees',JSON.stringify(trainees)); loadTrainees(); }
}

  var html = topbar('All Rooms','Complete breakdown all shifts');
  html += '<div class="cards cards-3" style="margin-bottom:20px">'
    + statCard('✅','Total Tasks',wData.totalTasks||0,'teal','All rooms')
    + statCard('🏢','Rooms',Object.keys(wData.byRoom||{}).length,'','Active')
    + statCard('🔄','Shifts',Object.keys(wData.byShift||{}).length,'yellow','Active')
    + '</div>';

  html += Object.keys(wData.byRoom||{}).map(function(room){
    var tasks=(wData.byRoom[room]||[]);
    var byQ={};
    tasks.forEach(function(t){var q=t['Queue Name']||'?';byQ[q]=(byQ[q]||0)+1;});
    return '<div class="card" style="margin-bottom:12px">'
      +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">'
      +'<span style="font-weight:600">'+room+'</span>'
      +'<span class="badge badge-teal">'+tasks.length+' tasks</span>'
      +'</div>'
      +'<div style="display:flex;gap:6px;flex-wrap:wrap">'
      +Object.keys(byQ).map(function(q){return '<span class="badge badge-gray">'+q+': '+byQ[q]+'</span>';}).join('')
      +'</div></div>';
  }).join('');

  document.getElementById('view-container').innerHTML = html;
}

async function renderAdminQuality(){
  var data = await api('getQualityData');
  var html = topbar('Quality — All Rooms','Company-wide analysis')
    + qualitySummaryCards(data.summary||{})
    + '<div class="section"><div class="section-title">By Room</div>'
    + Object.keys(data.byRoom||{}).map(function(room){
        return '<div class="card" style="margin-bottom:12px"><div class="section-title">'+room+'</div>'
          + qualityTable((data.byRoom[room]||[]).slice(0,8))+'</div>';
      }).join('')
    + '</div>';
  document.getElementById('view-container').innerHTML = html;
}

// ─────────────────────────────────────────────────────────
//  ADMIN USER ACTIONS
// ─────────────────────────────────────────────────────────
var ROLES = ['Labeler','Floor Supervisor','Shift Supervisor','QA & Training','Workload Manager','Admin'];
var SHIFTS = ['Over Night','Over Night 12H','Night','Morning','Morning 12H','Over Shift (N)','Over Shift (ON)','Over Shift (M)','All'];

function openAddUser(){
  var html = '<div class="modal-title">Add New User</div>'
    + userForm({})
    + '<div class="modal-footer">'
    + '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-teal" onclick="submitAddUser()">Add User</button>'
    + '</div>';
  openModal(html);
}

function openEditUser(email){
  var user = (window._usersData||[]).find(function(u){return u.email===email;})||{};
  var html = '<div class="modal-title">Edit User — '+email+'</div>'
    + userForm(user)
    + '<div class="modal-footer">'
    + '<button class="btn btn-ghost" onclick="closeModal()">Cancel</button>'
    + '<button class="btn btn-teal" onclick="submitEditUser(\''+email+'\')">Save</button>'
    + '</div>';
  openModal(html);
}

function userForm(u){
  return '<div class="form-field"><label class="form-label">Name</label><input class="form-input" id="uf-name" value="'+(u.name||'')+'"></div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'
    + '<div class="form-field"><label class="form-label">Role</label><select class="form-select" id="uf-role">'
    + ROLES.map(function(r){return '<option'+(r===u.role?' selected':'')+'>'+r+'</option>';}).join('')
    + '</select></div>'
    + '<div class="form-field"><label class="form-label">Shift</label><select class="form-select" id="uf-shift">'
    + SHIFTS.map(function(s){return '<option'+(s===u.shift?' selected':'')+'>'+s+'</option>';}).join('')
    + '</select></div></div>'
    + '<div class="form-field"><label class="form-label">Room</label><input class="form-input" id="uf-room" value="'+(u.room||'All')+'"></div>'
    + '<div class="form-field"><label class="form-label">New Password (optional)</label><input class="form-input" id="uf-pass" type="password" placeholder="Leave blank to keep current"></div>';
}

async function submitAddUser(){
  var email = prompt('Enter email:');
  if(!email) return;
  var payload = {
    email: email,
    name: document.getElementById('uf-name').value,
    role: document.getElementById('uf-role').value,
    shift: document.getElementById('uf-shift').value,
    room: document.getElementById('uf-room').value,
    password: document.getElementById('uf-pass').value||null,
  };
  var res = await api('admin_addUser',{user:payload});
  closeModal();
  if(res.success){ showToast('User added: '+email); renderAdminUsers(); }
  else showToast('Error: '+(res.error||'Failed'),'err');
}

async function submitEditUser(email){
  var payload = {
    name: document.getElementById('uf-name').value,
    role: document.getElementById('uf-role').value,
    shift: document.getElementById('uf-shift').value,
    room: document.getElementById('uf-room').value,
    newPassword: document.getElementById('uf-pass').value||null,
  };
  var res = await api('admin_editUser',{email:email, updates:payload});
  closeModal();
  if(res.success){ showToast('User updated'); renderAdminUsers(); }
  else showToast('Error: '+(res.error||'Failed'),'err');
}

async function toggleStatus(email){
  var res = await api('admin_toggleStatus',{email:email});
  if(res.success){ showToast('Status → '+res.newStatus); renderAdminUsers(); }
  else showToast('Error: '+(res.error||'Failed'),'err');
}

async function deleteUser(email){
  if(!confirm('Delete '+email+'?')) return;
  var res = await api('admin_deleteUser',{email:email});
  if(res.success){ showToast('Deleted: '+email); renderAdminUsers(); }
  else showToast('Error: '+(res.error||'Failed'),'err');
}

function filterUsers(q){
  var q=q.toLowerCase();
  document.querySelectorAll('#users-tbody tr').forEach(function(tr){
    tr.style.display = tr.textContent.toLowerCase().includes(q) ? '' : 'none';
  });
}

// ─────────────────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────────────────
function topbar(title, sub){
  return '<div class="topbar">'
    +'<div><div class="topbar-title">'+title+'</div><div class="topbar-sub">'+sub+'</div></div>'
    +'<button class="refresh-btn" onclick="switchView(CURRENT_VIEW)">↻ Refresh</button>'
    +'</div>';
}

function statCard(ico, label, value, color, sub){
  return '<div class="card card-sm">'
    +'<div class="card-icon">'+ico+'</div>'
    +'<div class="card-label">'+label+'</div>'
    +'<div class="card-value '+(color||'')+'">'+value+'</div>'
    +(sub?'<div class="card-sub">'+sub+'</div>':'')
    +'</div>';
}

function miniStat(label,value,color){
  return '<div style="text-align:center;padding:12px;background:rgba(255,255,255,0.03);border-radius:10px">'
    +'<div style="font-size:20px;font-weight:700;color:var(--'+color+')">'+value+'</div>'
    +'<div style="font-size:11px;color:var(--txt3);margin-top:2px">'+label+'</div>'
    +'</div>';
}

function badge(txt, type){
  return '<span class="badge badge-'+(type||'gray')+'">'+txt+'</span>';
}

function leaderboardHTML(list){
  if(!list||!list.length) return '<div class="empty-state">No data</div>';
  return '<div class="card">'
    + list.slice(0,15).map(function(item,i){
        var ranks=['gold','silver','bronze'];
        var rc=i<3?ranks[i]:'normal';
        return '<div class="lb-item">'
          +'<div class="lb-rank '+rc+'">'+(i+1)+'</div>'
          +'<div><div class="lb-name">'+(item.name||item.email||'—')+'</div>'
          +'<div class="lb-sub">'+(item.qtc||'—')+'</div></div>'
          +'<div class="lb-count">'+item.count+'</div>'
          +'</div>';
      }).join('')
    + '</div>';
}

function qualitySummaryCards(s){
  return '<div class="cards cards-4" style="margin-bottom:20px">'
    + statCard('📊','Average',s.avg||0+'%','teal','')
    + statCard('⬆','Best',s.max||0+'%','green','')
    + statCard('✅','Above 90%',s.above90||0,'green','Labelers')
    + statCard('⚠','Below 80%',s.below80||0,'red','Labelers')
    + '</div>';
}

function qualityTable(data){
  if(!data||!data.length) return '<div class="empty-state">No data</div>';
  return '<table><thead><tr><th>Email</th><th>Score</th><th>Status</th></tr></thead><tbody>'
    + data.map(function(q){
        var s=parseFloat(q['Accuracy']||q['Score']||q['Quality']||0);
        return '<tr><td style="font-size:12px">'+(q['Email']||q['email']||'—')+'</td>'
          +'<td><b style="color:'+(s>=90?'#4ade80':s>=80?'var(--teal)':'var(--yellow)')+'">'+s.toFixed(1)+'%</b></td>'
          +'<td>'+badge(s>=90?'Excellent':s>=80?'Good':s>=70?'Average':'Needs Work',s>=90?'green':s>=80?'teal':s>=70?'yellow':'red')+'</td>'
          +'</tr>';
      }).join('')
    + '</tbody></table>';
}

function qualityDetails(q){
  var s=parseFloat(q['Accuracy']||q['Score']||q['Quality']||0);
  return '<div style="text-align:center;padding:12px">'
    +'<div style="font-size:40px;font-weight:800;color:'+(s>=90?'#4ade80':s>=80?'var(--teal)':'var(--yellow)')+'">'+s.toFixed(1)+'%</div>'
    +'<div style="margin-top:8px">'+badge(s>=90?'Excellent':s>=80?'Good':s>=70?'Average':'Needs Work',s>=90?'green':s>=80?'teal':s>=70?'yellow':'red')+'</div>'
    +'<div class="progress-wrap" style="margin-top:12px"><div class="progress-bar"><div class="progress-fill '+(s>=90?'green':s>=80?'':s>=70?'yellow':'red')+'" style="width:'+s+'%"></div></div></div>'
    +'</div>';
}

function objToRows(obj){
  var keys = Object.keys(obj);
  if(!keys.length) return '<div class="empty-state">No data</div>';
  var total = keys.reduce(function(s,k){return s+(obj[k]||[]).length;},0)||1;
  return keys.map(function(k){
    var n=(obj[k]||[]).length;
    return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>'+k+'</span><span>'+n+'</span></div>'
      +'<div class="progress-bar"><div class="progress-fill" style="width:'+(n/total*100)+'%"></div></div></div>';
  }).join('');
}

function avgQuality(qualityMap){
  var vals = Object.values(qualityMap||{}).map(parseFloat).filter(Boolean);
  if(!vals.length) return 0;
  return (vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1);
}

function roleColor(role){
  var map={'Admin':'red','Shift Supervisor':'yellow','Floor Supervisor':'teal','QA & Training':'green','Workload Manager':'yellow','Labeler':'gray'};
  return map[role]||'gray';
}

function dateStr(val){
  if(!val) return '';
  try{
    var d = val instanceof Date ? val : new Date(val);
    if(isNaN(d)) return String(val).substring(0,10);
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }catch(e){return String(val).substring(0,10);}
}

function showError(msg){
  document.getElementById('view-container').innerHTML='<div class="empty-state" style="color:var(--red)">⚠ '+msg+'</div>';
}

function filterTable(){
  var q=(document.getElementById('f-search')||{}).value||'';
  var d=(document.getElementById('f-date')||{}).value||'';
  q=q.toLowerCase();
  document.querySelectorAll('#tasks-tbody tr').forEach(function(tr){
    var show=true;
    if(q&&!tr.textContent.toLowerCase().includes(q)) show=false;
    if(d&&!tr.textContent.includes(d)) show=false;
    tr.style.display=show?'':'none';
  });
}

function filterQTable(q){
  q=q.toLowerCase();
  document.querySelectorAll('#qtable tr').forEach(function(tr){
    tr.style.display=tr.textContent.toLowerCase().includes(q)?'':'none';
  });
}

// ── MODAL ────────────────────────────────────────────────
function openModal(html){
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('open');
}
document.getElementById('modal-bg').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// ── TOAST ────────────────────────────────────────────────
function showToast(msg, type){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;z-index:999;'
    +(type==='err'?'background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.4);color:#ff8a8a;'
    :'background:rgba(42,191,191,0.15);border:1px solid rgba(42,191,191,0.4);color:var(--teal);');
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},3000);
}
</script>
